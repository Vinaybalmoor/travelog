<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Add Expense | Travelog</title>
    <style>
      /* ===== BODY ===== */
      body {
        font-family: "Segoe UI", sans-serif;
        background: linear-gradient(135deg, #667eea, #764ba2);
        margin: 0;
        padding: 30px;
        color: #333;
      }

      /* ===== MAIN CARD LOOK ===== */
      body > * {
        max-width: 600px;
        margin-left: auto;
        margin-right: auto;
      }

      /* ===== HEADINGS ===== */
      h2 {
        text-align: center;
        color: white;
        margin-bottom: 20px;
      }

      h3 {
        color: #222;
      }

      /* ===== BACK BUTTON ===== */
      button {
        background: #545a60;
        color: rgb(248, 247, 247);
        border: none;
        padding: 10px 15px;
        border-radius: 6px;
        cursor: pointer;
        transition: 0.3s;
      }

      button:hover {
        background: #7c7c8b;
      }

      /* ===== FORM ===== */
      form {
        background: white;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
      }

      /* INPUTS */
      input,
      select {
        width: 100%;
        padding: 10px;
        margin-top: 8px;
        border-radius: 6px;
        border: 1px solid #ccc;
        font-size: 14px;
      }

      /* FOCUS EFFECT */
      input:focus,
      select:focus {
        outline: none;
        border-color: #667eea;
      }

      /* ===== TOTAL ===== */
      #total {
        font-size: 20px;
        font-weight: bold;
        color: #2d3748;
      }

      /* ===== EXPENSE LIST ===== */
      #expenseList {
        margin-top: 15px;
      }

      /* EXPENSE CARD */
      #expenseList div {
        background: white;
        padding: 12px;
        border-radius: 8px;
        margin-bottom: 10px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
        transition: 0.2s;
      }

      #expenseList div:hover {
        transform: scale(1.02);
      }

      /* CATEGORY LOOK */
      #expenseList span {
        background: #667eea;
        color: white;
        padding: 3px 8px;
        border-radius: 5px;
        font-size: 12px;
        margin-left: 10px;
      }

      /* ===== HR ===== */
      hr {
        border: none;
        height: 1px;
        background: #ddd;
        margin: 20px 0;
      }
    </style>
  </head>

  <body>
    <h2>💰 Add Expense</h2>

    <!-- 🔙 BACK BUTTON -->
    <button class="btn btn-outline-dark btn-sm mb-2" onclick="goBack()">
      ⬅ Back
    </button>

    <hr />

    <!-- ================= FORM ================= -->
    <form id="expenseForm">
      <input type="text" id="title" placeholder="Expense Title" required />

      <br /><br />

      <input type="number" id="amount" placeholder="Amount" required />

      <br /><br />

      <!-- ✅ CATEGORY MUST MATCH BACKEND ENUM -->
      <select id="category" required>
        <option value="">Select Category</option>
        <option value="accomodation">Accomodation</option>
        <option value="restaurant">Restaurant</option>
        <option value="shopping">Shopping</option>
        <option value="sightseeing">Sightseeing</option>
        <option value="transportation">Transportation</option>
      </select>

      <br /><br />

      <!-- OPTIONAL -->
      <select id="transportMode">
        <option value="">Transport Mode (optional)</option>
        <option value="car">Car</option>
        <option value="train">Train</option>
        <option value="bus">Bus</option>
        <option value="flight">Flight</option>
      </select>

      <br /><br />

      <button type="submit">Add Expense</button>
    </form>

    <hr />

    <!-- ================= TOTAL ================= -->
    <h3>Total: ₹<span id="total">0</span></h3>

    <!-- ================= LIST ================= -->
    <h3>All Expenses</h3>
    <div id="expenseList"></div>

    <!-- ================= SCRIPT ================= -->
    <script src="js/expenses.js"></script>
  </body>
</html>
