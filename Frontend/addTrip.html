<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Add Trip</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        background: linear-gradient(135deg, #eef2ff, #f8fafc);
        font-family: "Segoe UI", sans-serif;
      }

      .container-box {
        max-width: 450px;
        margin: 80px auto;
        background: rgba(255, 255, 255, 0.8);
        padding: 30px;
        border-radius: 18px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        backdrop-filter: blur(10px);
      }

      h2 {
        text-align: center;
        font-weight: 700;
        margin-bottom: 20px;
        color: #1e293b;
      }

      .form-control {
        border-radius: 10px;
        margin-bottom: 15px;
      }

      .btn-primary {
        width: 100%;
        border-radius: 12px;
        font-weight: 600;
        background: linear-gradient(135deg, #3b82f6, #2563eb);
        border: none;
      }

      .btn-primary:hover {
        background: linear-gradient(135deg, #2563eb, #1d4ed8);
      }

      .back-btn {
        margin-bottom: 15px;
      }

      #msg {
        text-align: center;
        margin-top: 15px;
        font-weight: 500;
      }
    </style>
  </head>

  <body>
    <div class="container-box">
      <!-- 🔙 Back Button -->
      <button class="btn btn-outline-dark btn-sm mb-2" onclick="goBack()">
        ⬅ Back
      </button>

      <h2>✈️ Add New Trip</h2>

      <form id="tripForm">
        <input
          type="text"
          id="name"
          class="form-control"
          placeholder="Trip Name"
          required
        />
        <input
          type="text"
          id="description"
          class="form-control"
          placeholder="Description"
        />

        <button type="submit" class="btn btn-primary">Create Trip</button>
      </form>

      <p id="msg"></p>
    </div>

    <script src="js/addTrip.js"></script>
  </body>
</html>
