<!doctype html>
<html>
  <head>
    <title>Add Place</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

    <style>
      body {
        font-family: "Segoe UI", sans-serif;
        background: #f5f7fb;
        padding: 20px;
      }

      h2 {
        margin-bottom: 10px;
      }

      #map {
        height: 400px;
        border-radius: 10px;
        margin-bottom: 15px;
      }

      input {
        padding: 10px;
        margin: 5px;
        border-radius: 8px;
        border: 1px solid #ccc;
        width: 200px;
      }

      button {
        padding: 10px 15px;
        border: none;
        border-radius: 8px;
        background: #2563eb;
        color: white;
        cursor: pointer;
      }

      button:hover {
        background: #1d4ed8;
      }
    </style>
  </head>

  <body>
    <button onclick="goBack()">⬅ Back</button>

    <h2>📍 Add Place (Select from Map)</h2>

    <!-- MAP -->
    <div id="map"></div>

    <!-- FORM -->
    <form id="placeForm">
      <input type="text" id="name" placeholder="Place Name" required />
      <input type="text" id="lat" placeholder="Latitude" readonly />
      <input type="text" id="lng" placeholder="Longitude" readonly />

      <br /><br />

      <button type="submit">Add Place</button>
    </form>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <script src="js/place.js"></script>

    <script>
      function goBack() {
        window.location.href = "tripDetails.html";
      }
    </script>
  </body>
</html>
