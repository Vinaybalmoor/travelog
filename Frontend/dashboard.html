<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Dashboard | Travelog</title>
    <link rel="stylesheet" href="css/styles.css" />

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  </head>

  <body>
    <script>
      if (!localStorage.getItem("token")) {
        alert("Please login first");
        window.location.href = "login.html";
      }
    </script>

    <div class="dashboard-container">
      <!-- HEADER -->
      <div class="dashboard-header">
        <h1>Travelog Dashboard 🌍</h1>
        <button onclick="logout()">Logout</button>
      </div>

      <!-- SELECT TRIP -->
      <div style="margin-bottom: 20px">
        <input type="text" id="tripInput" placeholder="Enter Trip ID" />
        <button onclick="selectTrip()">Select Trip</button>
      </div>

      <!-- NAVIGATION -->
      <div style="margin-bottom: 20px">
        <button onclick="goToAddPlace()">Add Place</button>
        <button onclick="goToAddExpense()">Add Expense</button>
      </div>

      <!-- PLACES -->
      <div class="trip-section">
        <h2>📍 Places</h2>
        <div id="placesList"></div>
      </div>

      <!-- EXPENSES -->
      <div class="trip-section">
        <h2>💰 Expenses</h2>
        <div id="expenseList"></div>
        <h3>Total: <span id="total">₹0</span></h3>
      </div>

      <!-- MAP -->
      <div class="trip-section">
        <h2>🗺️ Map</h2>
        <div id="map" style="height: 300px"></div>
      </div>
    </div>

    <script src="js/main.js"></script>

    <script>
      function logout() {
        localStorage.clear();
        window.location.href = "login.html";
      }

      function selectTrip() {
        const id = document.getElementById("tripInput").value;

        if (!id) {
          alert("Enter Trip ID");
          return;
        }

        localStorage.setItem("tripId", id);
        alert("Trip Selected!");
      }

      function goToAddPlace() {
        if (!localStorage.getItem("tripId")) {
          alert("Select a trip first!");
          return;
        }
        window.location.href = "addPlace.html";
      }

      function goToAddExpense() {
        if (!localStorage.getItem("tripId")) {
          alert("Select a trip first!");
          return;
        }
        window.location.href = "addExpense.html";
      }

      window.onload = () => {
        initMap();
      };
    </script>
  </body>
</html>
