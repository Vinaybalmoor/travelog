<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Dashboard | Travelog</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <script>
      const token = localStorage.getItem("token");
      if (!token) {
        alert("Please login first");
        window.location.href = "login.html";
      }
    </script>

    <div class="dashboard-container">
      <div class="dashboard-header">
        <h1>Travelog Dashboard 🌍</h1>
        <button onclick="logout()" class="logout-btn">Logout</button>
      </div>

      <div class="add-trip">
        <h2>Add / Update Trip</h2>

        <input type="text" id="title" placeholder="Trip Title" />
        <input type="text" id="description" placeholder="Trip Description" />

        <button id="addBtn" onclick="addTrip()">Add Trip</button>
      </div>

      <div class="trip-section">
        <h2>Your Trips</h2>
        <div id="tripList"></div>
      </div>
    </div>

    <script src="js/main.js"></script>
    <script>
      fetchTrips();
    </script>
  </body>
</html>
